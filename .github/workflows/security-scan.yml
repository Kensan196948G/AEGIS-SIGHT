name: Security Scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"  # Weekly Monday 6:00 UTC

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  trivy-scan:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Build API image for scanning
        continue-on-error: true
        run: |
          if [ -f aegis-sight-api/Dockerfile ]; then
            docker build -t aegis-sight-api:scan aegis-sight-api/
          else
            echo "::warning::aegis-sight-api/Dockerfile not found, skipping API image build"
          fi

      - name: Run Trivy on API image
        if: success()
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: "aegis-sight-api:scan"
          format: "sarif"
          output: "trivy-api-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"

      - name: Build Web image for scanning
        continue-on-error: true
        run: |
          if [ -f aegis-sight-web/Dockerfile ]; then
            docker build -t aegis-sight-web:scan aegis-sight-web/
          else
            echo "::warning::aegis-sight-web/Dockerfile not found, skipping Web image build"
          fi

      - name: Run Trivy on Web image
        if: success()
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: "aegis-sight-web:scan"
          format: "sarif"
          output: "trivy-web-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"

      - name: Upload Trivy API SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-api-results.sarif"
          category: "trivy-api"
        continue-on-error: true

      - name: Upload Trivy Web SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-web-results.sarif"
          category: "trivy-web"
        continue-on-error: true

  pip-audit:
    name: Python Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for requirements.txt
        id: check-requirements
        run: |
          if [ -f aegis-sight-api/requirements.txt ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::warning::aegis-sight-api/requirements.txt not found, skipping pip-audit"
          fi

      - name: Set up Python 3.12
        if: steps.check-requirements.outputs.exists == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "aegis-sight-api/requirements.txt"

      - name: Run pip-audit
        if: steps.check-requirements.outputs.exists == 'true'
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit -r aegis-sight-api/requirements.txt --format json --output pip-audit-results.json || true
          pip-audit -r aegis-sight-api/requirements.txt || true

      - name: Upload pip-audit results
        if: always() && steps.check-requirements.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-results
          path: pip-audit-results.json
          retention-days: 30
        continue-on-error: true

  npm-audit:
    name: Node.js Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for package-lock.json
        id: check-package
        run: |
          if [ -f aegis-sight-web/package-lock.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::warning::aegis-sight-web/package-lock.json not found, skipping npm audit"
          fi

      - name: Set up Node.js 20
        if: steps.check-package.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "aegis-sight-web/package-lock.json"

      - name: Run npm audit
        if: steps.check-package.outputs.exists == 'true'
        continue-on-error: true
        run: |
          cd aegis-sight-web
          npm audit --json > ../npm-audit-results.json || true
          npm audit || true

      - name: Upload npm audit results
        if: always() && steps.check-package.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-results
          path: npm-audit-results.json
          retention-days: 30
        continue-on-error: true

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-extended
        continue-on-error: true

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
        continue-on-error: true

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"
        continue-on-error: true
