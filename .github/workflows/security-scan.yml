name: Security Scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"  # Weekly Monday 6:00 UTC

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  trivy-scan:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    # Tier 1 hard-gate: fixable CRITICAL のみ block する。
    # ignore-unfixed: true (boolean) で「修正版が利用可能な CRITICAL」だけ exit 1。
    # HIGH は report-only ステップで visibility のみ確保する (Tier 2 で hard 化予定)。
    steps:
      - uses: actions/checkout@v6

      - name: Build API image for scanning
        id: build-api
        continue-on-error: true
        run: |
          if [ -f aegis-sight-api/Dockerfile ]; then
            docker build -t aegis-sight-api:scan aegis-sight-api/
          else
            echo "::warning::aegis-sight-api/Dockerfile not found, skipping API image build"
            echo "skipped=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Trivy on API image (CRITICAL hard-gate, fixable only)
        if: steps.build-api.outputs.skipped != 'true' && steps.build-api.outcome == 'success'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "aegis-sight-api:scan"
          format: "sarif"
          output: "trivy-api-critical.sarif"
          severity: "CRITICAL"
          ignore-unfixed: true
          exit-code: "1"

      - name: Run Trivy on API image (HIGH report-only)
        if: always() && steps.build-api.outputs.skipped != 'true' && steps.build-api.outcome == 'success'
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "aegis-sight-api:scan"
          format: "sarif"
          output: "trivy-api-high.sarif"
          severity: "HIGH"
          exit-code: "0"

      - name: Build Web image for scanning
        id: build-web
        if: always()
        continue-on-error: true
        run: |
          if [ -f aegis-sight-web/Dockerfile ]; then
            docker build -t aegis-sight-web:scan aegis-sight-web/
          else
            echo "::warning::aegis-sight-web/Dockerfile not found, skipping Web image build"
            echo "skipped=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Trivy on Web image (CRITICAL hard-gate, fixable only)
        if: steps.build-web.outputs.skipped != 'true' && steps.build-web.outcome == 'success'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "aegis-sight-web:scan"
          format: "sarif"
          output: "trivy-web-critical.sarif"
          severity: "CRITICAL"
          ignore-unfixed: true
          exit-code: "1"

      - name: Run Trivy on Web image (HIGH report-only)
        if: always() && steps.build-web.outputs.skipped != 'true' && steps.build-web.outcome == 'success'
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "aegis-sight-web:scan"
          format: "sarif"
          output: "trivy-web-high.sarif"
          severity: "HIGH"
          exit-code: "0"

      - name: Upload Trivy API CRITICAL SARIF
        if: always() && hashFiles('trivy-api-critical.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: "trivy-api-critical.sarif"
          category: "trivy-api-critical"
        continue-on-error: true

      - name: Upload Trivy API HIGH SARIF
        if: always() && hashFiles('trivy-api-high.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: "trivy-api-high.sarif"
          category: "trivy-api-high"
        continue-on-error: true

      - name: Upload Trivy Web CRITICAL SARIF
        if: always() && hashFiles('trivy-web-critical.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: "trivy-web-critical.sarif"
          category: "trivy-web-critical"
        continue-on-error: true

      - name: Upload Trivy Web HIGH SARIF
        if: always() && hashFiles('trivy-web-high.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: "trivy-web-high.sarif"
          category: "trivy-web-high"
        continue-on-error: true

  pip-audit:
    name: Python Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check for requirements.txt
        id: check-requirements
        run: |
          if [ -f aegis-sight-api/requirements.txt ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::warning::aegis-sight-api/requirements.txt not found, skipping pip-audit"
          fi

      - name: Set up Python 3.12
        if: steps.check-requirements.outputs.exists == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "aegis-sight-api/requirements.txt"

      - name: Run pip-audit
        if: steps.check-requirements.outputs.exists == 'true'
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit -r aegis-sight-api/requirements.txt --format json --output pip-audit-results.json || true
          pip-audit -r aegis-sight-api/requirements.txt || true

      - name: Upload pip-audit results
        if: always() && steps.check-requirements.outputs.exists == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: pip-audit-results
          path: pip-audit-results.json
          retention-days: 30
        continue-on-error: true

  npm-audit:
    name: Node.js Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check for package-lock.json
        id: check-package
        run: |
          if [ -f aegis-sight-web/package-lock.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::warning::aegis-sight-web/package-lock.json not found, skipping npm audit"
          fi

      - name: Set up Node.js 20
        if: steps.check-package.outputs.exists == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "aegis-sight-web/package-lock.json"

      - name: Run npm audit
        if: steps.check-package.outputs.exists == 'true'
        continue-on-error: true
        run: |
          cd aegis-sight-web
          npm audit --json > ../npm-audit-results.json || true
          npm audit || true

      - name: Upload npm audit results
        if: always() && steps.check-package.outputs.exists == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: npm-audit-results
          path: npm-audit-results.json
          retention-days: 30
        continue-on-error: true

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          queries: security-extended
        continue-on-error: true

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4
        continue-on-error: true

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:python"
        continue-on-error: true
