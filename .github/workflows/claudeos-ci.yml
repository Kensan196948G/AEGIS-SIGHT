name: ClaudeOS CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python linters
        run: pip install ruff mypy

      - name: Run Ruff (Python)
        run: ruff check . --output-format=github || true

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Node dependencies
        run: |
          if [ -f aegis-sight-web/package.json ]; then
            cd aegis-sight-web && npm ci
          fi

      - name: Run ESLint (TypeScript)
        run: |
          if [ -f aegis-sight-web/package.json ]; then
            cd aegis-sight-web && npx eslint . || true
          fi

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: aegis
          POSTGRES_PASSWORD: aegis_test
          POSTGRES_DB: aegis_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U aegis"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          if [ -f aegis-sight-api/requirements.txt ]; then
            pip install -r aegis-sight-api/requirements.txt
          fi
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Run pytest
        env:
          DATABASE_URL: postgresql://aegis:aegis_test@localhost:5432/aegis_test
        run: |
          if [ -d aegis-sight-api/tests ]; then
            cd aegis-sight-api && pytest --cov=app --cov-report=xml -v || true
          else
            echo "No tests found yet. Skipping."
          fi

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run Vitest (Frontend)
        run: |
          if [ -f aegis-sight-web/package.json ]; then
            cd aegis-sight-web && npm ci && npx vitest run --coverage || true
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        run: |
          if [ -f aegis-sight-api/Dockerfile ]; then
            docker build -t aegis-sight-api:ci aegis-sight-api/
          else
            echo "No Dockerfile for API yet. Skipping."
          fi

      - name: Build Web image
        run: |
          if [ -f aegis-sight-web/Dockerfile ]; then
            docker build -t aegis-sight-web:ci aegis-sight-web/
          else
            echo "No Dockerfile for Web yet. Skipping."
          fi

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Bandit (Python security)
        run: |
          pip install bandit
          if [ -d aegis-sight-api ]; then
            bandit -r aegis-sight-api/app/ -f json -o bandit-report.json || true
          fi

      - name: Check for secrets
        run: |
          pip install detect-secrets
          detect-secrets scan --all-files --exclude-files '\.git/.*' > .secrets-report.json || true
