name: ClaudeOS CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "aegis-sight-api/requirements.txt"

      - name: Install Python linters
        run: pip install ruff mypy

      - name: Run Ruff (Python)
        run: ruff check . --output-format=github || true

      - name: Set up Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "aegis-sight-web/package-lock.json"

      - name: Install Node dependencies
        run: |
          if [ -f aegis-sight-web/package.json ]; then
            cd aegis-sight-web && npm ci
          fi

      - name: Run ESLint (TypeScript)
        run: |
          if [ -f aegis-sight-web/package.json ]; then
            cd aegis-sight-web && npx eslint . || true
          fi

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: aegis
          POSTGRES_PASSWORD: aegis_test
          POSTGRES_DB: aegis_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U aegis"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            aegis-sight-api/requirements.txt
            aegis-sight-api/requirements-dev.txt

      - name: Install Python dependencies
        run: |
          if [ -f aegis-sight-api/requirements.txt ]; then
            pip install -r aegis-sight-api/requirements.txt
          fi
          if [ -f aegis-sight-api/requirements-dev.txt ]; then
            pip install -r aegis-sight-api/requirements-dev.txt
          else
            pip install pytest pytest-asyncio pytest-cov httpx factory-boy
          fi

      - name: Run pytest
        id: pytest
        env:
          DATABASE_URL: postgresql+asyncpg://aegis:aegis_test@localhost:5432/aegis_test
        run: |
          if [ -d aegis-sight-api/tests ]; then
            cd aegis-sight-api && pytest --cov=app --cov-report=xml --cov-report=html --junitxml=../test-results/pytest-results.xml -v 2>&1 | tee ../test-results/pytest-output.txt || true
          else
            mkdir -p ../test-results
            echo "No tests found yet. Skipping." | tee ../test-results/pytest-output.txt
          fi

      - name: Set up Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "aegis-sight-web/package-lock.json"

      - name: Run Vitest (Frontend)
        run: |
          if [ -f aegis-sight-web/package.json ]; then
            cd aegis-sight-web && npm ci && npx vitest run --coverage --reporter=junit --outputFile=../test-results/vitest-results.xml || true
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: test-results/
          retention-days: 30

      - name: Upload Python coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: python-coverage
          path: aegis-sight-api/htmlcov/
          retention-days: 30

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: aegis-sight-api/coverage.xml
          flags: python
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Post test summary to PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let summary = '## Test Results Summary\n\n';

            // Read pytest output
            try {
              const pytestOutput = fs.readFileSync('test-results/pytest-output.txt', 'utf8');
              const lines = pytestOutput.split('\n');
              const resultLine = lines.find(l => l.includes('passed') || l.includes('failed') || l.includes('error') || l.includes('No tests'));
              summary += `### Python (pytest)\n\`\`\`\n${resultLine || 'No result line found'}\n\`\`\`\n\n`;
            } catch (e) {
              summary += '### Python (pytest)\nNo test output available.\n\n';
            }

            summary += '---\n*Posted by ClaudeOS CI*';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build API image
        run: |
          if [ -f aegis-sight-api/Dockerfile ]; then
            docker build -t aegis-sight-api:ci aegis-sight-api/
          else
            echo "No Dockerfile for API yet. Skipping."
          fi

      - name: Build Web image
        continue-on-error: true
        run: |
          if [ -f aegis-sight-web/Dockerfile ]; then
            docker build -t aegis-sight-web:ci aegis-sight-web/ || echo "::warning::Web image build failed (non-blocking)"
          else
            echo "No Dockerfile for Web yet. Skipping."
          fi

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "aegis-sight-api/requirements.txt"

      - name: Run Bandit (Python security)
        run: |
          pip install bandit
          if [ -d aegis-sight-api ]; then
            bandit -r aegis-sight-api/app/ -f json -o bandit-report.json || true
          fi

      - name: Check for secrets
        run: |
          pip install detect-secrets
          detect-secrets scan --all-files --exclude-files '\.git/.*' > .secrets-report.json || true

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: security-reports
          path: |
            bandit-report.json
            .secrets-report.json
          retention-days: 30
