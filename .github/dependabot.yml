version: 2
updates:
  # Python dependencies (aegis-sight-api)
  - package-ecosystem: "pip"
    directory: "/aegis-sight-api"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"
    reviewers:
      - "Kensan196948G"
    commit-message:
      prefix: "deps(python):"

  # Node.js dependencies (aegis-sight-web)
  - package-ecosystem: "npm"
    directory: "/aegis-sight-web"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "javascript"
    reviewers:
      - "Kensan196948G"
    commit-message:
      prefix: "deps(npm):"
    groups:
      # vitest ecosystem: must stay at same major version (peer dependency)
      vitest-ecosystem:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "jsdom"
      # React ecosystem: major upgrades need coordinated testing
      react-ecosystem:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      # Next.js ecosystem: must align with eslint-config-next
      nextjs-ecosystem:
        patterns:
          - "next"
          - "eslint-config-next"
      # Build tools
      build-tools:
        patterns:
          - "@vitejs/*"
          - "vite"
          - "autoprefixer"
          - "postcss"
          - "tailwindcss"
      # TypeScript + ESLint toolchain (major upgrades require CI validation before merge)
      # Note: TypeScript 5→6 is a major upgrade; eslint 8→10 per Issue #238 migration plan
      type-tools:
        patterns:
          - "typescript"
          - "eslint"
          - "@typescript-eslint/*"
          - "@types/*"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
    reviewers:
      - "Kensan196948G"
    commit-message:
      prefix: "deps(actions):"

  # Docker
  - package-ecosystem: "docker"
    directory: "/aegis-sight-api"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "docker"
    reviewers:
      - "Kensan196948G"
    commit-message:
      prefix: "deps(docker):"

  - package-ecosystem: "docker"
    directory: "/aegis-sight-web"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "docker"
    reviewers:
      - "Kensan196948G"
    commit-message:
      prefix: "deps(docker):"
