version: "3.9"

# Test overrides - use with:
#   docker compose -f docker-compose.yml -f docker-compose.test.yml up --abort-on-container-exit

services:
  api:
    environment:
      - DATABASE_URL=postgresql+asyncpg://aegis:aegis_test@db-test:5432/aegis_sight_test
      - REDIS_URL=redis://redis:6379/1
      - TESTING=1
      - SECRET_KEY=test-secret-key
    command: >
      sh -c "
        python -m pytest tests/ -v --tb=short --junitxml=/app/test-results/results.xml &&
        echo 'All tests passed'
      "
    volumes:
      - ./aegis-sight-api/test-results:/app/test-results
    depends_on:
      db-test:
        condition: service_healthy
      redis:
        condition: service_healthy

  db-test:
    image: postgres:16
    container_name: aegis-sight-db-test
    environment:
      - POSTGRES_USER=aegis
      - POSTGRES_PASSWORD=aegis_test
      - POSTGRES_DB=aegis_sight_test
    tmpfs:
      - /var/lib/postgresql/data
    networks:
      - aegis-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegis -d aegis_sight_test"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  # Disable services not needed for testing
  web:
    profiles:
      - skip
  celery-worker:
    profiles:
      - skip
  celery-beat:
    profiles:
      - skip
  prometheus:
    profiles:
      - skip
  grafana:
    profiles:
      - skip
