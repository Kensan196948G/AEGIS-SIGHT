version: "3.9"

# Development overrides - use with:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  api:
    build:
      target: development
    volumes:
      - ./aegis-sight-api:/app
    environment:
      - DEBUG=1
      - LOG_LEVEL=debug
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  web:
    build:
      target: development
    volumes:
      - ./aegis-sight-web:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
    command: npm run dev

  celery-worker:
    volumes:
      - ./aegis-sight-api:/app
    command: celery -A app.worker worker --loglevel=debug --concurrency=2
    environment:
      - DEBUG=1
      - LOG_LEVEL=debug

  celery-beat:
    volumes:
      - ./aegis-sight-api:/app
    command: celery -A app.worker beat --loglevel=debug
    environment:
      - DEBUG=1
      - LOG_LEVEL=debug

  db:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"
