global:
  scrape_interval: 60s
  evaluation_interval: 60s
  scrape_timeout: 10s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "aegis-sight-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["aegis-sight-api:8000"]
        labels:
          service: "api"
          environment: "production"

  - job_name: "postgres-exporter"
    static_configs:
      - targets: ["postgres-exporter:9187"]
        labels:
          service: "database"
          environment: "production"
