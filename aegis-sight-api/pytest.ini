[pytest]
asyncio_mode = auto
# pytest-asyncio 0.24+: declare session-wide event loop scope here,
# not via a custom event_loop fixture (which is deprecated).
asyncio_default_fixture_loop_scope = session
testpaths = tests
markers =
    integration: Integration tests spanning multiple API endpoints
    unit: Unit tests for isolated components
    slow: Tests that take longer than 5 seconds to run
    rbac: Role-based access control tests
    iams: IAMS移植テスト（Jest → pytest変換）Phase1〜5
filterwarnings =
    ignore::DeprecationWarning
    ignore::pytest.PytestUnraisableExceptionWarning
