[pytest]
asyncio_mode = auto
testpaths = tests
markers =
    integration: Integration tests spanning multiple API endpoints
    unit: Unit tests for isolated components
    slow: Tests that take longer than 5 seconds to run
    rbac: Role-based access control tests
    iams: IAMS移植テスト（Jest → pytest変換）Phase1〜5
filterwarnings =
    ignore::DeprecationWarning
